spring.application.name=library-management

# K?t n?i Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/library_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# C?u hình JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.deserialization.fail-on-unknown-properties=true

# =======================================
# C?U HÌNH B?O M?T JWT
# =======================================
# Khóa bí m?t (Secret Key) dùng ?? ký và xác minh JWT.
# ?ây là m?t chu?i Base64 ?? dài và an toàn. KHÔNG chia s? khóa này!
application.security.jwt.secret-key=NDI4NzM3YjM0ZDRlMmI3YjY4N2Q1YjYxNGE2NDU3NmQ1OTcwMmQzYjM2NzYyZjY5NjE0ZDY0NjU0NjQ1NDE0Mg==

# Th?i gian h?t h?n c?a JWT (tính b?ng mili-giây)
# 3600000 = 1 gi?
# 86400000 = 24 gi? (1 ngày)
application.security.jwt.expiration=86400000
